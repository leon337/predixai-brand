<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1192" viewBox="0 0 1000 1192" role="img" aria-labelledby="title desc"><title id="title">Fluxo conceitual PredixAI Workforce</title><desc id="desc">Entradas de canais passam pelo orquestrador central, são distribuídas para agentes especializados, geram ações e resultados, com base central e controle humano.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050b13"/><stop offset="1" stop-color="#0c1c31"/></linearGradient><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#52f2d2"/><stop offset=".55" stop-color="#5da8ff"/><stop offset="1" stop-color="#9c7bff"/></linearGradient><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#5da8ff" stroke-opacity=".07"/></pattern><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 8 4 0 8Z" fill="#52f2d2"/></marker></defs><rect width="1000" height="1192" rx="34" fill="url(#bg)"/><rect width="1000" height="1192" rx="34" fill="url(#grid)"/><text x="500" y="64" text-anchor="middle" fill="#f4f8ff" font-family="Arial,sans-serif" font-size="34" font-weight="700">PREDIXAI WORKFORCE</text><text x="500" y="98" text-anchor="middle" fill="#52f2d2" font-family="Courier New,monospace" font-size="17" letter-spacing="2">FLUXO DE DEPARTAMENTOS INTELIGENTES</text><g font-family="Arial,sans-serif"><rect x="55" y="145" width="220" height="265" rx="24" fill="#0b1a2c" stroke="#5da8ff" stroke-opacity=".65"/><text x="165" y="182" text-anchor="middle" fill="#5da8ff" font-size="20" font-weight="700">1. ENTRADAS</text><g fill="#c8d8e8" font-size="17"><text x="85" y="225">WhatsApp</text><text x="85" y="260">Instagram e redes</text><text x="85" y="295">Site e chat</text><text x="85" y="330">E-mail e voz</text><text x="85" y="365">Sistemas e APIs</text></g><rect x="330" y="145" width="615" height="150" rx="24" fill="#17132d" stroke="#9c7bff" stroke-opacity=".75"/><text x="637" y="187" text-anchor="middle" fill="#d9c8ff" font-size="22" font-weight="700">2. ORQUESTRADOR CENTRAL</text><text x="637" y="224" text-anchor="middle" fill="#c8d8e8" font-size="17">Entende • prioriza • distribui • acompanha</text><text x="637" y="258" text-anchor="middle" fill="#7f96af" font-size="15">Regras, permissões, contexto e qualidade</text><path d="M275 220H320" stroke="#52f2d2" stroke-width="3" marker-end="url(#arrow)"/><rect x="330" y="340" width="615" height="420" rx="24" fill="#0a201b" stroke="#52f2d2" stroke-opacity=".68"/><text x="637" y="382" text-anchor="middle" fill="#52f2d2" font-size="22" font-weight="700">3. AGENTES ESPECIALIZADOS</text><g fill="#0e2a23" stroke="#52f2d2" stroke-opacity=".4"><rect x="360" y="420" width="170" height="118" rx="17"/><rect x="552" y="420" width="170" height="118" rx="17"/><rect x="744" y="420" width="170" height="118" rx="17"/><rect x="360" y="560" width="170" height="118" rx="17"/><rect x="552" y="560" width="170" height="118" rx="17"/><rect x="744" y="560" width="170" height="118" rx="17"/></g><g text-anchor="middle" fill="#f4f8ff" font-size="17" font-weight="700"><text x="445" y="465">Atendimento</text><text x="637" y="465">Comercial</text><text x="829" y="465">Administrativo</text><text x="445" y="605">Financeiro</text><text x="637" y="605">Operações</text><text x="829" y="605">Gestão</text></g><g text-anchor="middle" fill="#9db0c7" font-size="13"><text x="445" y="495">em validação</text><text x="637" y="495">planejado</text><text x="829" y="495">planejado</text><text x="445" y="635">planejado</text><text x="637" y="635">planejado</text><text x="829" y="635">planejado</text></g><path d="M637 295V330" stroke="#52f2d2" stroke-width="3" marker-end="url(#arrow)"/><rect x="55" y="455" width="220" height="305" rx="24" fill="#0b1a2c" stroke="#5da8ff" stroke-opacity=".65"/><text x="165" y="495" text-anchor="middle" fill="#5da8ff" font-size="20" font-weight="700">4. AÇÕES</text><g fill="#c8d8e8" font-size="16"><text x="82" y="540">Respostas</text><text x="82" y="575">Agendamentos</text><text x="82" y="610">Alertas</text><text x="82" y="645">Documentos</text><text x="82" y="680">Atualizações</text><text x="82" y="715">Encaminhamentos</text></g><path d="M330 600H285" stroke="#52f2d2" stroke-width="3" marker-end="url(#arrow)"/><rect x="55" y="810" width="890" height="150" rx="24" fill="#211b0d" stroke="#f2c94c" stroke-opacity=".7"/><text x="500" y="850" text-anchor="middle" fill="#f2c94c" font-size="21" font-weight="700">5. BASE CENTRAL</text><text x="500" y="890" text-anchor="middle" fill="#c8d8e8" font-size="17">Memória • conhecimento • políticas • logs • segurança • APIs internas</text><text x="500" y="925" text-anchor="middle" fill="#7f96af" font-size="14">Contexto compartilhado com acesso controlado</text><path d="M637 760V800" stroke="#f2c94c" stroke-width="3" marker-end="url(#arrow)"/><rect x="55" y="1010" width="890" height="130" rx="24" fill="#251012" stroke="#ff6b8b" stroke-opacity=".75"/><text x="500" y="1052" text-anchor="middle" fill="#ff9cb2" font-size="21" font-weight="700">6. ADMINISTRAÇÃO E CONTROLE HUMANO</text><text x="500" y="1092" text-anchor="middle" fill="#c8d8e8" font-size="17">Permissões • monitoramento • métricas • revisão • treinamento • decisões importantes</text><path d="M500 960V1000" stroke="#ff9cb2" stroke-width="3" marker-end="url(#arrow)"/></g></svg>
