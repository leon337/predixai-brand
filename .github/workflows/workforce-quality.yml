name: Validar PTP-WEB.2 Workforce
on:
  pull_request:
    paths: ["index.html","assets/**","solucoes/**","validacao/**","privacidade/**","api/**","supabase/**","scripts/**","sitemap.xml","manifest.webmanifest","vercel.json",".github/workflows/**"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Executar validação estática
        run: |
          chmod +x scripts/build_vercel_static.sh scripts/validate_workforce.sh
          bash scripts/validate_workforce.sh
      - name: Garantir ausência de credenciais administrativas
        run: |
          set -Eeuo pipefail
          if git grep -nE 'SUPABASE_SERVICE_ROLE|sb_secret_|sk-[A-Za-z0-9_-]{20,}' -- \
            ':!*.md' \
            ':!reports/**' \
            ':!.github/workflows/workforce-quality.yml'
          then
            echo 'Possível credencial administrativa encontrada.' >&2
            exit 1
          fi
          echo 'ADMIN_CREDENTIAL_SCAN=PASS'
