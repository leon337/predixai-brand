name: Validar formulário comercial
on:
  push:
    branches: [main]
    paths: ["api/**","validacao/**","privacidade/**","obrigado/**","solucoes/**","assets/js/form.js","assets/css/workforce.css","supabase/**","vercel.json",".github/workflows/form-e2e.yml"]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: predixai-form-e2e-${{ github.ref }}
  cancel-in-progress: true
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: https://predixai-brand.vercel.app
    steps:
      - name: Aguardar deployment
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 36);do status="$(curl -sS -o health.json -w '%{http_code}' "${BASE_URL}/api/leads"||true)";if [[ "${status}" == 200 ]]&&grep -q '"service":"predixai-leads"' health.json;then cat health.json;exit 0;fi;sleep 10;done;exit 1
      - name: Validar páginas
        run: |
          set -Eeuo pipefail
          for path in / /validacao/ /privacidade/ /obrigado/ /solucoes/workforce/ /solucoes/atendimento/ /solucoes/pet/ /solucoes/market/;do status="$(curl -sS -o /dev/null -w '%{http_code}' "${BASE_URL}${path}")";[[ "${status}" == 200 ]]||exit 1;done
      - name: Rejeitar sem consentimento
        run: |
          status="$(curl -sS -o consent.json -w '%{http_code}' -H 'content-type: application/json' -H "origin: ${BASE_URL}" -d '{"source":"workforce","product_interest":"workforce","person_name":"Teste CI","business_name":"PredixAI CI","city":"Recife","state":"PE","business_segment":"Serviços","preferred_contact":"email","contact_value":"consent@example.com","main_problem":"Teste","desired_result":"Validar","commercial_interest":["diagnostico"],"consent_contact":false,"website":""}' "${BASE_URL}/api/leads")";[[ "${status}" == 422 ]]&&grep -q CONSENT_REQUIRED consent.json
      - name: Bloquear honeypot
        run: |
          status="$(curl -sS -o honeypot.json -w '%{http_code}' -H 'content-type: application/json' -H "origin: ${BASE_URL}" -d '{"source":"sob_medida","product_interest":"sob_medida","person_name":"Teste CI","business_name":"PredixAI CI","city":"Recife","state":"PE","business_segment":"Serviços","preferred_contact":"email","contact_value":"honeypot@example.com","main_problem":"Teste","desired_result":"Validar","commercial_interest":["diagnostico"],"consent_contact":true,"website":"preenchido"}' "${BASE_URL}/api/leads")";[[ "${status}" == 400 ]]&&grep -q SPAM_DETECTED honeypot.json
      - name: Rejeitar origem externa
        run: |
          status="$(curl -sS -o origin.json -w '%{http_code}' -H 'content-type: application/json' -H 'origin: https://example.invalid' -d '{}' "${BASE_URL}/api/leads")";[[ "${status}" == 403 ]]&&grep -q ORIGIN_NOT_ALLOWED origin.json
      - run: echo VALID_LEAD_INSERT=MANUAL_PREVIEW_ONLY
