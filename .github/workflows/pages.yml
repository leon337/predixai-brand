name: Publicar site PredixAI BR
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validar e construir escopo público
        run: |
          chmod +x scripts/build_vercel_static.sh scripts/validate_workforce.sh scripts/prepare_github_pages.sh
          bash scripts/validate_workforce.sh
          bash scripts/prepare_github_pages.sh
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
